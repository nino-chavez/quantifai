<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="372" viewBox="0 0 1200 372"
     role="img" aria-labelledby="arch-title arch-desc">
  <title id="arch-title">QuantifAI architecture</title>
  <desc id="arch-desc">Your machine's Claude Code JSONL and git history feed the quantifai-sync shipper, which posts to a Cloudflare Worker running SvelteKit with D1 storage. Provider APIs are polled separately via Worker secrets. The Worker serves an Access-gated ledger and practice-numbers UI.</desc>

  <defs>
    <clipPath id="arch-canvas-clip">
      <rect width="1200" height="372" rx="26"/>
    </clipPath>
  </defs>
  <g clip-path="url(#arch-canvas-clip)">
    <rect width="1200" height="372" fill="#0a0a0a"/>
  </g>
  <rect x="0.5" y="0.5" width="1199" height="371" rx="25.5" fill="none" stroke="#2a2724"/>

  <g transform="translate(0 -88)" font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, monospace" fill="#a39d92">

    <!-- Node A: Your machine -->
    <rect x="48" y="150" width="230" height="120" rx="14" fill="#131210" stroke="#2a2724"/>
    <text x="64" y="178" font-size="12" letter-spacing="1">YOUR MACHINE</text>
    <line x1="64" y1="190" x2="254" y2="190" stroke="#211f1c"/>
    <text x="64" y="216" font-size="12.5" fill="#f4f1ec">Claude Code JSONL</text>
    <text x="64" y="238" font-size="12.5" fill="#f4f1ec">git commit history</text>

    <!-- Arrow A -> B -->
    <line x1="278" y1="205" x2="422" y2="205" stroke="#736c60" stroke-width="1.5"/>
    <polygon points="422,205 410,199 410,211" fill="#736c60"/>
    <text x="354" y="192" font-size="12" text-anchor="middle" fill="#c7c1b6">quantifai-sync</text>

    <!-- Node B: Cloudflare Worker -->
    <rect x="430" y="120" width="300" height="180" rx="14" fill="#131210" stroke="#2a2724"/>
    <text x="446" y="148" font-size="12" letter-spacing="1">CLOUDFLARE WORKER</text>
    <text x="446" y="164" font-size="10.5" fill="#736c60">SvelteKit on Workers</text>
    <line x1="446" y1="176" x2="714" y2="176" stroke="#211f1c"/>

    <rect x="446" y="190" width="190" height="24" rx="12" fill="#1b1917" stroke="#2a2724"/>
    <text x="541" y="206.5" font-size="11" text-anchor="middle" fill="#f4f1ec">POST /api/v1/ingest</text>

    <line x1="470" y1="214" x2="470" y2="224" stroke="#736c60" stroke-width="1.25"/>
    <polygon points="470,224 465.5,216 474.5,216" fill="#736c60"/>

    <rect x="446" y="228" width="140" height="24" rx="12" fill="#1b1917" stroke="#2a2724"/>
    <text x="516" y="244.5" font-size="11" text-anchor="middle" fill="#f4f1ec">D1 (SQLite)</text>

    <!-- Arrow B -> C -->
    <line x1="730" y1="205" x2="874" y2="205" stroke="#736c60" stroke-width="1.5"/>
    <polygon points="874,205 862,199 862,211" fill="#736c60"/>

    <!-- Node C: Ledger UI -->
    <rect x="880" y="150" width="272" height="120" rx="14" fill="#131210" stroke="#2a2724"/>
    <text x="896" y="178" font-size="11.5" letter-spacing="0.8">LEDGER · PRACTICE-NUMBERS</text>
    <line x1="896" y1="190" x2="1128" y2="190" stroke="#211f1c"/>
    <rect x="896" y="204" width="118" height="22" rx="11" fill="#1b1917" stroke="#2a2724"/>
    <text x="955" y="219" font-size="10.5" text-anchor="middle" fill="#f4f1ec">ACCESS-GATED</text>
    <text x="896" y="250" font-size="10.5" fill="#736c60">one operator, one deployment</text>

    <!-- Node D: Provider APIs -->
    <rect x="430" y="360" width="300" height="90" rx="14" fill="#131210" stroke="#2a2724"/>
    <text x="446" y="386" font-size="11.5" letter-spacing="0.8">PROVIDER APIS (POLLED)</text>
    <rect x="446" y="402" width="86" height="22" rx="11" fill="#1b1917" stroke="#2a2724"/>
    <text x="489" y="417" font-size="10" text-anchor="middle" fill="#c7c1b6">ANTHROPIC</text>
    <rect x="542" y="402" width="68" height="22" rx="11" fill="#1b1917" stroke="#2a2724"/>
    <text x="576" y="417" font-size="10" text-anchor="middle" fill="#c7c1b6">OPENAI</text>
    <rect x="620" y="402" width="92" height="22" rx="11" fill="#1b1917" stroke="#2a2724"/>
    <text x="666" y="417" font-size="10" text-anchor="middle" fill="#c7c1b6">OPENROUTER</text>

    <!-- Arrow D -> B (dashed, cron poll) -->
    <line x1="580" y1="360" x2="580" y2="304" stroke="#736c60" stroke-width="1.5" stroke-dasharray="4 4"/>
    <polygon points="580,300 574,312 586,312" fill="#736c60"/>
    <text x="592" y="336" font-size="11" fill="#736c60">cron poll</text>
    <text x="592" y="350" font-size="11" fill="#736c60">(Worker secret)</text>
  </g>
</svg>
